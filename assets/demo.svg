<svg xmlns="http://www.w3.org/2000/svg" width="820" height="556" viewBox="0 0 820 556" font-family="'SF Mono','JetBrains Mono','Menlo',monospace" font-size="13.5">
  <defs>
    <clipPath id="round"><rect x="0" y="0" width="820" height="556" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="820" height="556" fill="#0d1117"/>
    <rect x="0" y="0" width="820" height="32" fill="#161b22"/>
    <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="16" r="6" fill="#27c93f"/>
    <text x="410" y="20" text-anchor="middle" fill="#8b949e">captain-obvious 🫡 — the type checker already knew</text>
  </g>

  <!-- command -->
  <text x="20" y="62"><tspan fill="#27c93f">$</tspan><tspan fill="#79c0ff" dx="8">node</tspan><tspan fill="#c9d1d9" dx="8">captain_obvious_ts.mjs</tspan><tspan fill="#a5d6ff" dx="8">--project ./repo</tspan></text>
  <text x="20" y="92" fill="#e6edf3">captain-obvious (TS) — 36 tests scanned in 2 files</text>

  <!-- summary: fixed columns at x=40 / 300 / 420 -->
  <g font-size="13.5">
    <text y="122"><tspan x="40" fill="#8b949e">type-guaranteed</tspan><tspan x="300" fill="#ff7b72">proven: 3</tspan><tspan x="440" fill="#d29922">advisory: 6</tspan></text>
    <text y="144"><tspan x="40" fill="#8b949e">constant-assert</tspan><tspan x="300" fill="#ff7b72">proven: 1</tspan><tspan x="440" fill="#6e7681">advisory: 0</tspan></text>
    <text y="166"><tspan x="40" fill="#8b949e">mock-echo</tspan><tspan x="300" fill="#ff7b72">proven: 1</tspan><tspan x="440" fill="#6e7681">advisory: 0</tspan></text>
    <text y="188"><tspan x="40" fill="#8b949e">boundary-tautology</tspan><tspan x="300" fill="#ff7b72">proven: 1</tspan><tspan x="440" fill="#6e7681">advisory: 0</tspan></text>
    <text y="210"><tspan x="40" fill="#8b949e">duplicate-test</tspan><tspan x="300" fill="#ff7b72">proven: 1</tspan><tspan x="440" fill="#d29922">advisory: 1</tspan></text>
  </g>

  <line x1="20" y1="230" x2="800" y2="230" stroke="#21262d" stroke-width="1"/>
  <text x="20" y="256" fill="#e6edf3">Findings:</text>

  <text y="284"><tspan x="20" fill="#ff7b72">[PROVEN  ]</tspan><tspan dx="8" fill="#8b949e">lib.test.ts:8</tspan><tspan dx="8" fill="#c9d1d9">(type-guaranteed)</tspan><tspan dx="8" fill="#a5d6ff">"add returns a number"</tspan></text>
  <text x="40" y="304" fill="#6e7681">compiler already guarantees typeof is "number"  →  safe to delete</text>

  <text y="332"><tspan x="20" fill="#ff7b72">[PROVEN  ]</tspan><tspan dx="8" fill="#8b949e">lib.test.ts:21</tspan><tspan dx="8" fill="#c9d1d9">(constant-assert)</tspan><tspan dx="8" fill="#a5d6ff">"user equals itself"</tspan></text>
  <text x="40" y="352" fill="#6e7681">compares u.name to itself  →  safe to delete</text>

  <text y="380"><tspan x="20" fill="#ff7b72">[PROVEN  ]</tspan><tspan dx="8" fill="#8b949e">lib.test.ts:44</tspan><tspan dx="8" fill="#c9d1d9">(mock-echo)</tspan><tspan dx="8" fill="#a5d6ff">"mock returns value"</tspan></text>
  <text x="40" y="400" fill="#6e7681">asserts the mock returns what it was just stubbed with  →  safe to delete</text>

  <text y="428"><tspan x="20" fill="#d29922">[ADVISORY]</tspan><tspan dx="8" fill="#8b949e">lib.test.ts:33</tspan><tspan dx="8" fill="#c9d1d9">(type-guaranteed)</tspan><tspan dx="8" fill="#a5d6ff">"list is an array"</tspan></text>
  <text x="40" y="448" fill="#6e7681">subject inlines a call — kept advisory to preserve smoke coverage</text>

  <text y="476"><tspan x="20" fill="#d29922">[ADVISORY]</tspan><tspan dx="8" fill="#8b949e">lib.test.ts:29</tspan><tspan dx="8" fill="#c9d1d9">(type-guaranteed)</tspan><tspan dx="8" fill="#a5d6ff">"plain is a Plain"</tspan></text>
  <text x="40" y="496" fill="#6e7681">TS is structural — a shaped non-instance could sneak in, not provable</text>

  <line x1="20" y1="516" x2="800" y2="516" stroke="#21262d" stroke-width="1"/>
  <text y="540"><tspan x="20" fill="#e6edf3">tests fully removable:</tspan><tspan dx="6" fill="#27c93f">6</tspan><tspan dx="24" fill="#e6edf3">assertions removable:</tspan><tspan dx="6" fill="#27c93f">1</tspan><tspan dx="24" fill="#6e7681"># zero LLM calls</tspan></text>
</svg>
